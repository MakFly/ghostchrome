name: Update Homebrew

on:
  release:
    types: [published]

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          # Download checksums
          gh release download "$TAG" --pattern "checksums.txt" --clobber

          DARWIN_AMD64=$(grep darwin-amd64 checksums.txt | awk '{print $1}')
          DARWIN_ARM64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')
          LINUX_AMD64=$(grep linux-amd64 checksums.txt | awk '{print $1}')
          LINUX_ARM64=$(grep linux-arm64 checksums.txt | awk '{print $1}')

          # Generate formula
          cat > /tmp/ghostchrome.rb << FORMULA
          class Ghostchrome < Formula
            desc "Ultra-light browser automation CLI for LLM agents"
            homepage "https://github.com/MakFly/ghostchrome"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/MakFly/ghostchrome/releases/download/${TAG}/ghostchrome-darwin-amd64"
                sha256 "${DARWIN_AMD64}"
              end
              on_arm do
                url "https://github.com/MakFly/ghostchrome/releases/download/${TAG}/ghostchrome-darwin-arm64"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/MakFly/ghostchrome/releases/download/${TAG}/ghostchrome-linux-amd64"
                sha256 "${LINUX_AMD64}"
              end
              on_arm do
                url "https://github.com/MakFly/ghostchrome/releases/download/${TAG}/ghostchrome-linux-arm64"
                sha256 "${LINUX_ARM64}"
              end
            end

            def install
              binary = Dir["ghostchrome-*"].first || "ghostchrome"
              bin.install binary => "ghostchrome"
            end

            test do
              assert_match "ghostchrome version", shell_output("#{bin}/ghostchrome --version")
            end
          end
          FORMULA

          # Push to homebrew-tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/MakFly/homebrew-tap.git /tmp/tap
          cp /tmp/ghostchrome.rb /tmp/tap/Formula/ghostchrome.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ghostchrome.rb
          git commit -m "feat: update ghostchrome to ${TAG}" || echo "No changes"
          git push
